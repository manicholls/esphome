esphome:
  name: terminal-board
  friendly_name: Terminal Board

rp2040:
  board: rpipicow

# Enable logging
logger:

# Enable Home Assistant API
api:
  encryption:
    key: ""

ota:
  - platform: esphome
    password: ""

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password

button:
  - platform: restart
    name: "Restart"      
# Example configuration entry
switch:
  - platform: gpio
    pin: GPIO0
    name: "GPIO 0"
  - platform: gpio
    pin: GPIO1
    name: "GPIO 1"
  - platform: gpio
    pin: GPIO2
    name: "GPIO 2"
  - platform: gpio
    pin: GPIO3
    name: "GPIO 3"

     
binary_sensor:
  - platform: status
    name: "Node Status"
    id: system_status
    icon: mdi:lan-connect

sensor:
  - platform: adc
    pin: TEMPERATURE
    name: "Core Temperature"
    unit_of_measurement: "°C"
    filters:
      - lambda: return 27 - (x - 0.706f) / 0.001721f;

status_led:
  pin:
    number: LED

time:
  - platform: homeassistant

