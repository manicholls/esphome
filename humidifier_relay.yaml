esphome:
  name: humidifier-relay
  friendly_name: Humidifier Relay

esp32:
  board: esp32-s3-devkitc-1
  framework:
    type: esp-idf

packages:
  github: github://manicholls/esphome/common/esp32.yaml@main
  
# Enable logging
logger:

# Enable Home Assistant API
api:
  encryption:
    key: !secret api_key
  # Optional: reboot if disconnected for 15 minutes
  reboot_timeout: 15min

ota:
  - platform: esphome
    password: !secret ota_password

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password


# Individual Switch Configuration
switch:
  - platform: gpio
    pin: 47
    name: "Humidifier Relay"
    id: relay_1
    restore_mode: ALWAYS_OFF  # Options: ALWAYS_ON, ALWAYS_OFF, RESTORE_DEFAULT_OFF
    inverted: false           # Set to 'true' if your relay triggers on LOW signal

# Standard Bluetooth Proxy setup
bluetooth_proxy:
  active: true

# Tracker: Updates the global counter on every packet received
esp32_ble_tracker:
  id: ble_tracker
  scan_parameters: 
    active: false 

# Time component needed for the clock
time:
  - platform: sntp
    id: time_ms
    servers:
      - ntp.home.lan

sensor:
  - platform: homeassistant
    name: "Humidifier Demand"
    id: outside_temperature
    entity_id: sensor.daikin_indoor_humidifier_demand
    internal: True
    on_value:
      then:
        - if:
            condition:
              lambda: 'return x >= 1.0;' # Wait until demand is at least 1%
            then:
              - switch.turn_on: relay_1
        - if:
            condition:
              lambda: 'return x == 0;' # Only turn off when it hits exactly 0
            then:
              - switch.turn_off: relay_1
