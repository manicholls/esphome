esphome:
  name: enviro-indoor
  friendly_name: enviro-indoor
  on_boot: 
    priority: 1000
    then:
      - lambda: |-
          pinMode(2, OUTPUT);
          digitalWrite(2, HIGH);
          delay(100);
      - pcf85063.read_time:

rp2040:
  board: rpipicow

packages:
  github: github://manicholls/esphome/common/rp2040.yaml

logger:
  level: DEBUG

api:
  encryption:
    key: !secret api_key

ota:
  - platform: esphome
    password: !secret ota_password

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password


external_components:
  - source: github://manicholls/bh1745@main
    components: [bh1745]
    
i2c:
  - id: bus_a   # RTC + QWST + BME688 + BH1745
    sda: 4
    scl: 5
    scan: True

i2c_device:
  id: rtc
  address: 0x51

bh1745:
  id: bh1745_base               # <-- Unique ID for the component instance
  address: 0x38                 # I2C Address (0x38 or 0x39)
  update_interval: 60s           # Polling interval
  integration_time: 160ms       # 160ms, 320ms, 640ms, 1280ms
  gain: 32x                     # 1x or 32x

sensor:
  - platform: bh1745
    id: bh1745_base
    illuminance:
      name: "Ambient Lux"
      unit_of_measurement: "lx"
      accuracy_decimals: 0
    red:
      name: "Ambient Red Channel"
    green:
      name: "Ambient Green Channel"
    blue:
      name: "Ambient Blue Channel"
  - platform: bme680
    address: 0x77
    temperature:
      name: "BME688 Temperature"
    humidity:
      name: "BME688 Humidity"
    pressure:
      name: "BME688 Pressure"
    gas_resistance:
      name: "BME688 Gas Resistance"


binary_sensor:
  - id: activity_button
    name: "Activity Button"
    platform: gpio
    pin: 
      number: GPIO7   
    on_press:
      then:
        - logger.log: "Activity Button Pressed"
        - light.turn_on:
            id: activity_led
        - delay: 1000ms
        - light.turn_off:
            id: activity_led

time:
  - platform: pcf85063
    id: pcf85063_time
    address: 0x51
    update_interval: never
  - platform: sntp
    on_time_sync:
      then:
        - pcf85063.write_time:
        - lambda: |-
            id(rtc).write_byte(0x01, 0x07);
output:
  - platform: gpio
    pin: GPIO2
    id: HOLD_VSYS_ENV
  - platform: rp2040_pwm
    id: act_led
    pin: GPIO6

light:
  - platform: monochromatic
    output: act_led
    id: activity_led
    name: "Activity LED"
    internal: True
