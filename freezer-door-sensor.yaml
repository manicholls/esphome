esphome:
  name: fridge-door-sensor
  friendly_name: Fridge Freezer Door Sensor

rp2040:
  board: rpipicow

packages:
  github: github://manicholls/esphome/common/rp2040.yaml

# Enable logging
logger:

# Enable Home Assistant API
api:
  encryption:
    key: !secret api_key

ota:
  - platform: esphome
    password: !secret ota_password

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
    
sensor:
  - platform: adc
    id: fridge_door
    pin: GPIO26
    name: "Door Sensor"
    update_interval: 30s
    accuracy_decimals: 0
    internal: True

binary_sensor:
  - platform: template
    icon: mdi:fridge-alert
    name: "Freezer Door Open"
    lambda: |-
      if (id(fridge_door).state < 1 or id(fridge_door).state > 2 ) {
        // Freezer Door is closed.
        return false;
      } else {
        // Freezer Door is open.
        return true;
      }
