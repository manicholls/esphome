esphome:
  name: enviro-grow
  friendly_name: Enviro Grow
  on_boot: 
    priority: 1000
    then:
      - lambda: |-
          pinMode(2, OUTPUT);
          digitalWrite(2, HIGH);
          delay(100);
      - pcf85063.read_time:

rp2040:
  board: rpipicow

packages:
  github: github://manicholls/esphome/common/rp2040.yaml

# Enable logging
logger:

# Enable Home Assistant API
api:
  encryption:
    key: ""

ota:
  - platform: esphome
    password: ""

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password


i2c:
  - id: bus_a   
    sda: 4
    scl: 5
    scan: true

i2c_device:
  id: rtc
  address: 0x51

sensor:
  - platform: bme280_i2c
    id: bme280
    temperature:
      name: "Temperature"
      filters:
        - offset: -4.5
        - throttle: 300s
      on_value:
        then:
          - light.turn_on:
              id: activity_led
          - delay: 1000ms
          - light.turn_off:
              id: activity_led
    pressure:
      name: "Pressure"
      filters:
        - throttle: 60s
    humidity:
      name: "Humidity"
      filters:
        - throttle: 60s

  - platform: ltr_als_ps
    address: 0x23
    update_interval: 60s
    #type: PS  # or ALS or PS
    ambient_light: "Ambient light"

  - platform: pulse_counter
    pin: 
      number: GPIO13
      mode:
        input: true
        pulldown: true    
    name: "Moisture Sensor C"
    unit_of_measurement: "%"
    icon: "mdi:flower-tulip"
    update_interval: 60s
    filters:
      - calibrate_linear:
         method: least_squares
         datapoints:
          - 1615 -> 0
          - 100 -> 100
      - clamp:
          min_value: 0
          max_value: 100
          ignore_out_of_range: true
  
  - platform: pulse_counter
    pin:
      number: GPIO14
      mode:
        input: true
        pulldown: true    
    name: "Moisture Sensor B"
    unit_of_measurement: "%"
    icon: "mdi:flower-tulip"
    update_interval: 60s
    filters:
      - calibrate_linear:
         method: least_squares
         datapoints:
          - 1615 -> 0
          - 100 -> 100
      - clamp:
          min_value: 0
          max_value: 100
          ignore_out_of_range: true

  - platform: pulse_counter
    pin:
      number: GPIO15
      mode:
        input: true
        pulldown: true    
    name: "Moisture Sensor A"
    unit_of_measurement: "%"
    icon: "mdi:flower-tulip"
    update_interval: 60s
    filters:
      - calibrate_linear:
         method: least_squares
         datapoints:
          # Map from sensor to percentage.  Higher pulses = low percentage
          - 1615 -> 0
          - 100 -> 100
      - clamp:
          min_value: 0
          max_value: 100
          ignore_out_of_range: true

binary_sensor:
  - id: activity_button
    name: "Activity Button"
    platform: gpio
    pin: 
      number: GPIO7   
    on_press:
      then:
        - logger.log: "Activity Button Pressed"
        - light.turn_on:
            id: activity_led
        - delay: 1000ms
        - light.turn_off:
            id: activity_led
        - component.update: bme280

time:
  - platform: pcf85063
    id: pcf85063_time
    address: 0x51
    update_interval: never
  - platform: homeassistant
    # instead try to synchronize via network repeatedly ...
    on_time_sync:
      then:
        # ... and update the RTC when the synchronization was successful
        - pcf85063.write_time:
        - lambda: |-
            id(rtc).write_byte(0x01, 0x07);
output:
  - platform: gpio
    pin: GPIO2
    id: HOLD_VSYS_ENV

  - platform: rp2040_pwm
    id: buzzer_output
    pin: GPIO28

  - platform: rp2040_pwm
    id: act_led
    pin: GPIO6

# Activity LED
light:
  - platform: monochromatic
    output: act_led
    id: activity_led
    name: "Activity LED"
    internal: True

rtttl:
  output: buzzer_output
  id: my_rtttl
  gain: 30%
