esphome:
  name: bedroom-display
  friendly_name: Bedroom Display
  on_boot:
    - output.set_level:
        id: backlight
        level: 100%
packages:
  github: github://manicholls/esphome/common/esp32.yaml@main
psram:
  mode: octal
  speed: 80MHz

esp32:
  variant: esp32s3
  flash_size: 16MB
  framework:
    type: esp-idf

logger:

spi:
  mosi_pin: GPIO47
  clk_pin: GPIO48

i2c:
  scl: GPIO45
  sda: GPIO19

output:
  - platform: ledc
    pin: GPIO38
    id: backlight

light:
  - platform: monochromatic
    name: Backlight
    id: display_backlight
    output: backlight
    restore_mode: ALWAYS_ON
    default_transition_length: 1s

display:
  - platform: st7701s
    id: my_display
    color_order: RGB
    dimensions:
      width: 480
      height: 480
    spi_mode: MODE3
    invert_colors: False
    cs_pin: GPIO39
    de_pin: GPIO18
    hsync_pin: GPIO16
    vsync_pin: GPIO17
    pclk_pin: GPIO21
    data_rate: 2MHz
    pclk_frequency: 12MHz
    pclk_inverted: False
    hsync_pulse_width: 8
    hsync_front_porch: 10
    hsync_back_porch: 20
    vsync_pulse_width: 8
    vsync_front_porch: 10
    vsync_back_porch: 10
    update_interval: never
    auto_clear_enabled: False
    init_sequence:
      - 1
      - [0xFF, 0x77, 0x01, 0x00, 0x00, 0x10]
      - [0xCD, 0x00]
    data_pins:
      red: [11, 12, 13, 14, 0]
      green: [8, 20, 3, 46, 9, 10]
      blue: [4, 5, 6, 7, 15]

touchscreen:
  platform: gt911
  id: my_touchscreen
  on_release:
    - lvgl.resume:
    - lvgl.widget.redraw:
    - light.turn_on: 
        id: display_backlight
        brightness: 100%

api:
  encryption:
    key: !secret api_key

ota:
  - platform: esphome
    password: !secret ota_password

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password

time:
  - platform: sntp
    id: ha_time

text_sensor:
  - platform: homeassistant
    entity_id: weather.ayr_weather
    id: weather_desc
  - platform: homeassistant
    entity_id: sensor.daikin_outdoor_temperature
    id: weather_temp

globals:
  - id: manual_override_active
    type: bool
    restore_value: no
    initial_value: 'false'

binary_sensor:
  - platform: homeassistant
    entity_id: light.bedroom_lamp
    id: light_1_state
    on_state:
      then:
        - lvgl.widget.update:
            id: btn_light_1
            bg_color: !lambda "return x ? lv_color_hex(0xFFD700) : lv_color_hex(0x333333);"
  - platform: homeassistant
    entity_id: switch.kitchen_light
    id: light_2_state
    on_state:
      then:
        - lvgl.widget.update:
            id: btn_light_2
            bg_color: !lambda "return x ? lv_color_hex(0xFFD700) : lv_color_hex(0x333333);"

switch:
  - platform: template
    name: "Manual Night Mode"
    id: night_mode_switch
    optimistic: true
    on_turn_on:
      - globals.set: {id: manual_override_active, value: 'true'}
    on_turn_off:
      - globals.set: {id: manual_override_active, value: 'true'}

interval:
  - interval: 1s
    then:
      - lvgl.label.update:
          id: digital_clock
          text: !lambda 'return id(ha_time).now().strftime("%H:%M");'
      - lvgl.label.update:
          id: weather_label_text
          text: !lambda 'return id(weather_temp).state + "°C";'
      - lvgl.label.update:
          id: weather_icon_label
          text: !lambda |-
            std::string state = id(weather_desc).state;
            if (state == "sunny") return std::string("\U000F0599");
            if (state == "cloudy") return std::string("\U000F0592");
            if (state == "rainy" || state == "pouring") return std::string("\U000F0596");
            if (state == "snowy") return std::string("\U000F0703");
            return std::string("\U000F0591");

  - interval: 5s
    then:
      - lambda: |-
          auto now = id(ha_time).now();
          if (now.second < 10 && now.minute == 0 && (now.hour == 7 || now.hour == 22)) {
            id(manual_override_active) = false;
          }
      - lvgl.label.update:
          id: digital_clock
          text_color: !lambda |-
            auto now = id(ha_time).now();
            bool is_night = id(manual_override_active) ? id(night_mode_switch).state : (now.hour >= 22 || now.hour < 7);
            return is_night ? lv_color_hex(0xFF0000) : lv_color_hex(0xFFFFFF);
      - lvgl.label.update:
          id: status_bar_temp
          text: !lambda 'return id(weather_temp).state + "°C";'
          text_color: !lambda |-
            auto now = id(ha_time).now();
            bool is_night = id(manual_override_active) ? id(night_mode_switch).state : (now.hour >= 22 || now.hour < 7);
            return is_night ? lv_color_hex(0xAA0000) : lv_color_hex(0xAAAAAA);


lvgl:
  touchscreens:
    - touchscreen_id: my_touchscreen
  buffer_size: 20%
  on_idle:
    timeout: 7s
    then:
      - lvgl.widget.update: {id: clock_container, hidden: false}
      - lvgl.widget.update: {id: page_main, hidden: true}
      - light.turn_on: {id: display_backlight, brightness: 50%}
  on_resume:
    then:
      - lvgl.widget.update: {id: clock_container, hidden: true}
      - lvgl.widget.update: {id: page_main, hidden: false}
      - light.turn_on: {id: display_backlight, brightness: 100%}

  top_layer:
    widgets:
      - obj:
          id: clock_container
          width: 100%
          height: 100%
          bg_color: 0x000000
          border_width: 0
          hidden: true
          widgets:
            - label: {id: digital_clock, text: "--:--", align: CENTER, text_font: font_clock}
            - label: {id: status_bar_temp, text: "--°C", text_font: font_main, align: TOP_MID, y: 20}

  pages:
    - id: page_main
      bg_color: 0x181a6b
      widgets:
        - obj:
            width: 100%
            height: 100%
            bg_opa: 0
            align: CENTER
            layout: 
              type: flex
              flex_flow: COLUMN
              flex_align_main: CENTER
              flex_align_cross: CENTER
              # Use pad_row instead of flex_gap for vertical spacing
              pad_row: 15 
            widgets:
              - obj:
                  width: 100%
                  height: 120
                  bg_opa: 0
                  align: CENTER
                  layout: 
                    type: flex
                    flex_flow: ROW
                    flex_align_main: CENTER
                    flex_align_cross: CENTER
                    # Use pad_column for horizontal spacing
                    pad_column: 10 
                  widgets:
                    - label: {id: weather_icon_label, text: "", text_font: font_icon, text_color: 0xF5F5ED}
                    - label: {id: weather_label_text, text: "", text_font: font_main, text_color: 0xF5F5ED}
              - button:
                  id: btn_light_1
                  width: 300
                  height: 80
                  align: CENTER
                  widgets:
                    - label:
                        text: "Bedroom Lamp"
                        text_font: roboto_18
                        align: CENTER
                  on_click:
                    then:
                      - homeassistant.service:
                          service: light.toggle
                          data: {entity_id: "light.bedroom_lamp"}
              - button:
                  id: btn_light_2
                  width: 300
                  height: 80
                  align: CENTER
                  widgets:
                    - label:
                        text: "Kitchen Light"
                        text_font: roboto_18
                        align: CENTER
                  on_click:
                    then:
                      - homeassistant.service:
                          service: switch.toggle
                          data: {entity_id: "switch.kitchen_light"}
              - button:
                  width: 300
                  height: 80
                  align: CENTER
                  bg_color: 0x444444
                  widgets:
                    - label:
                        text: "Toggle Night Mode"
                        text_font: roboto_18
                        align: CENTER
                  on_click:
                    then:
                      - switch.toggle: night_mode_switch

font:
  - file: "gfonts://Roboto"
    id: roboto_18
    size: 18
  - file: "gfonts://Roboto"
    id: font_clock
    size: 120
  - file: "gfonts://Roboto"
    id: font_main
    size: 48
  - file: "https://github.com/Templarian/MaterialDesign-Webfont/raw/master/fonts/materialdesignicons-webfont.ttf"
    id: font_icon
    size: 80
    glyphs: ["\U000F0599", "\U000F0592", "\U000F0596", "\U000F0591", "\U000F0703"]
  - file: "https://github.com/Templarian/MaterialDesign-Webfont/raw/master/fonts/materialdesignicons-webfont.ttf"
    id: font_icon_small
    size: 40
    glyphs: ["\U000F03AD", "\U000F0317", "\U000F0318"]
